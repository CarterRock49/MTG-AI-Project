name: Long-game invariant fuzz

on:
  schedule:
    - cron: "17 5 * * 0"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: long-game-invariant-fuzz
  cancel-in-progress: false

jobs:
  fuzz:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Check fuzz profiles and replay artifacts
        run: python tests/invariant_fuzz_config_test.py

      - name: Run scheduled long-game fuzz
        run: >-
          python tests/invariant_fuzz_test.py
          --profile long
          --artifact-dir fuzz_failures

      - name: Upload replay artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: invariant-fuzz-replay-${{ github.run_id }}
          path: fuzz_failures/*.json
          if-no-files-found: ignore
          retention-days: 14
